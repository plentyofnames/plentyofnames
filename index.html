<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Plenty of Names</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; background: #1a1a1a; color: #fff; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  .banner {
    # background: #1a1a1a;
    background: #000000;
    text-align: center;
    border-bottom: 3px solid #629aa9;
  }
  .banner img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 320px;
    object-fit: contain;
    margin: 0 auto;
  }

  .tabs {
    display: flex;
    justify-content: center;
    background: #222;
    border-bottom: 1px solid #333;
  }
  .tab {
    flex: 0 0 auto;
    padding: 14px 28px;
    cursor: pointer;
    background: none;
    border: none;
    color: #aaa;
    font-size: 1rem;
    font-family: inherit;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab:hover { color: #fff; }
  .tab.active {
    color: #fff;
    border-bottom-color: #629aa9;
  }

  .tab-content {
    flex: 1;
    display: none;
    min-height: 0;
  }
  .tab-content.active { display: flex; }
  .tab-content iframe {
    width: 100%;
    flex: 1;
    border: none;
    background: #fff;
    min-height: 70vh;
  }
</style>
</head>
<body>
  <header class="banner">
    <img src="plonc_banner_clean.png" alt="Plenty of Names">
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" role="tab" data-target="music">Music</button>
    <button class="tab" role="tab" data-target="shows">Software</button>
  </nav>

  <section id="music" class="tab-content active">
    <iframe src="https://plentyofnames.bandcamp.com" title="Music"></iframe>
  </section>
  <section id="shows" class="tab-content">
    <iframe src="https://www.songkick.com/artists/plentyofnames" title="Shows"></iframe>
  </section>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.target;
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        contents.forEach(c => c.classList.toggle('active', c.id === target));
      });
    });
  </script>
</body>
</html>
